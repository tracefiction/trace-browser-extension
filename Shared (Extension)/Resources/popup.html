<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <main class="popup">
        <header class="popup-brand">
            <img class="popup-brand-mark" src="images/trace-mark.svg" alt="" width="32" height="32" />
            <span class="popup-brand-name">trace</span>
        </header>
        <section class="popup-sheet" aria-labelledby="popup-status">
            <p class="popup-eyebrow">Extension lens</p>
            <p id="popup-status" class="popup-status" role="status">Checking Trace connection…</p>
            <p id="popup-lead" class="popup-lead">
                Open Trace and sign in once to connect the extension. Then refresh an AO3 or FFN tab to see your library status and keep progress synced.
            </p>
        </section>
        <section
            id="popup-pro-settings"
            class="popup-pro-settings hidden"
            aria-labelledby="popup-pro-heading"
        >
            <h2 id="popup-pro-heading" class="popup-pro-heading">Extension behavior</h2>
            <label class="popup-switch-row" for="pref-auto-track">
                <span>Automatic tracking</span>
                <input type="checkbox" id="pref-auto-track" />
            </label>
            <label class="popup-switch-row" for="pref-library-inlay">
                <span>Library status on sites</span>
                <input type="checkbox" id="pref-library-inlay" />
            </label>
            <label class="popup-switch-row" for="pref-metadata-improve">
                <span>Improve shared story metadata</span>
                <input type="checkbox" id="pref-metadata-improve" />
            </label>
        </section>
        <div class="popup-actions">
            <button id="popup-import" class="popup-import" type="button">
                Import from this page
            </button>
            <a
                id="popup-cta"
                class="popup-cta"
                href="https://tracefiction.com/"
                target="_blank"
                rel="noopener noreferrer"
            >
                Open Trace to connect
            </a>
        </div>
    </main>
</body>
</html>
